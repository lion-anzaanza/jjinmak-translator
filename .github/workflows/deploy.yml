name: Deploy

on:
  push:
    branches:
      - release

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/jjinmak-translator:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/jjinmak-translator:${{ github.sha }}

      - name: Deploy to server
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USERNAME }}
          port: ${{ secrets.SSH_PORT }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            docker pull ${{ secrets.DOCKERHUB_USERNAME }}/jjinmak-translator:latest
            mkdir -p ~/jjinmak-data
            docker cp jjinmak:/app/db/jjinmak.db ~/jjinmak-data/jjinmak.db 2>/dev/null || true
            docker stop jjinmak || true
            docker rm jjinmak || true
            docker run -d \
              --name jjinmak \
              -p 80:5000 \
              -v ~/jjinmak-data:/app/db \
              --restart unless-stopped \
              ${{ secrets.DOCKERHUB_USERNAME }}/jjinmak-translator:latest
            docker image prune -f
